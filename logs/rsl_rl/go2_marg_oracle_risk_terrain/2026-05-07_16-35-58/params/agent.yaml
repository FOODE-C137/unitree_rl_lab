seed: 42
device: cuda:0
num_steps_per_env: 25
max_iterations: 30000
empirical_normalization: false
policy:
  class_name: unitree_rl_lab.tasks.locomotion.agents.MARG_ORACLE.go2_marg_oracle_actor_critic:Go2MargOracleActorCritic
  init_noise_std: 1.0
  noise_std_type: scalar
  actor_hidden_dims:
  - 256
  - 128
  - 64
  critic_hidden_dims:
  - 256
  - 128
  - 64
  activation: elu
  policy_raw_obs_dim: 45
  policy_history_obs_dim: 225
  policy_terrain_obs_dim: 187
  privileged_obs_dim: 42
  terrain_hidden_dims:
  - 128
  - 64
  terrain_feat_dim: 16
  estimator_hidden_dims:
  - 256
  - 128
  estimator_output_dim: 7
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.01
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  symmetry_cfg: null
  rnd_cfg: null
  estimator_loss_coef: 1.0
  velocity_loss_coef: 1.0
  contact_loss_coef: 0.5
clip_actions: null
save_interval: 100
experiment_name: go2_marg_oracle_risk_terrain
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: model_.*.pt
runner_class_name: unitree_rl_lab.tasks.locomotion.agents.MARG_ORACLE.go2_marg_oracle_runner:Go2MargOracleRunner
task_type: risk_terrain
