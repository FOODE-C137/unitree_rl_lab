seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 30000
empirical_normalization: false
policy:
  class_name: unitree_rl_lab.tasks.locomotion.agents.MARG_ORACLE.go2_marg_oracle_actor_critic:Go2MargOracleActorCritic
  init_noise_std: 1.0
  noise_std_type: scalar
  actor_hidden_dims:
  - 512
  - 256
  - 128
  critic_hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  proprioception: 45
  proprioception_history: 270
  terrain_height: 187
  privileged: 42
  terrain_hidden_dims:
  - 128
  - 64
  terrain_feat_dim: 16
  estimator_hidden_dims:
  - 256
  - 128
  estimator_output_dim: 7
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.01
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  symmetry_cfg:
    use_data_augmentation: true
    use_mirror_loss: true
    data_augmentation_func: unitree_rl_lab.tasks.locomotion.agents.MARG_ORACLE.go2_marg_oracle_rsl_rl_ppo_cfg:compute_symmetric_states_go2_marg_oracle
    mirror_loss_coeff: 0.1
  rnd_cfg: null
  estimator_loss_coef: 1.0
  velocity_loss_coef: 1.0
  contact_loss_coef: 0.5
clip_actions: null
save_interval: 100
experiment_name: go2_marg_oracle_risk_terrain
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: true
load_run: .*
load_checkpoint: model_.*.pt
runner_class_name: unitree_rl_lab.tasks.locomotion.agents.MARG_ORACLE.go2_marg_oracle_runner:Go2MargOracleRunner
task_type: risk_terrain
